name: Build DarkPS Agent Terminal APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install latest SDK tools and platforms
        run: |
          # قبول التراخيص
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          
          # تحديث أدوات SDK
          yes | sdkmanager --update > /dev/null 2>&1 || true
          
          # تثبيت أحدث إصدارات المنصة والأدوات المطلوبة
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest" "platform-tools" "extras;android;m2repository" "extras;google;m2repository" 2>&1 || true
          
          # تثبيت NDK إذا كان متاحاً
          yes | sdkmanager "ndk;25.2.9519653" 2>&1 || true
          
          # عرض المنصات والأدوات المثبتة
          echo "=== Installed SDK packages ==="
          sdkmanager --list_installed 2>/dev/null | grep -E "platforms|build-tools|cmdline-tools|platform-tools|ndk" || echo "No packages listed"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME || '/usr/local/lib/android/sdk' }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkPS-Agent-Terminal-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release and Upload APK
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="v1.0.${{ github.run_number }}"
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          NOTES="## DarkPS Agent Terminal $TAG
          🚀 **DarkPS Agent** - وكيل ذكاء اصطناعي متكامل
          
          ### المميزات:
          - 🤖 محادثة مع وكلاء AI متعددين
          - 🌙 واجهة سوداء بالكامل (Dark Theme)
          - 📁 إدارة ملفات كاملة
          - 🔄 اختيار النموذج من 22+ نموذج AI
          - 📋 سجل الأحداث
          
          ### Features:
          - Chat with multiple AI agents
          - Full dark theme
          - Complete file management
          - 22+ AI model selection
          - Event logging
          
          ### التحديثات:
          - ✅ تم بناء التطبيق تلقائياً عبر GitHub Actions
          - ✅ APK جاهز للتحميل"
          
          gh release create "$TAG" \
            --title "DarkPS Agent Terminal $TAG" \
            --notes "$NOTES" \
            "$APK_PATH"
          
          echo "✅ Release $TAG created with APK!"

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DarkPS-Agent-Terminal-Release-APK
          path: app/build/outputs/apk/debug/app-debug.apk
